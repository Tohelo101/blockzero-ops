name: build-pool-miner

on:
  push:
    branches: [main]
    tags: ['pool-miner-v*']
    paths:
      - 'pool/native/**'
      - 'pool/scripts/**'
      - '.github/workflows/build-pool-miner.yml'
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install CMake
        run: choco install cmake -y
      - name: Install OpenSSL runtime
        run: choco install openssl.light -y --no-progress
      - name: Build bz-pool-miner
        shell: pwsh
        run: ./pool/scripts/build-native.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: bz-pool-miner-windows
          path: |
            pool/bin/bz-pool-miner.exe
            pool/bin/libssl-3-x64.dll
            pool/bin/libcrypto-3-x64.dll

  linux:
    # ubuntu-22.04: glibc 2.35 — runs on Ubuntu 22.04+, Debian 12+, most current VPS.
    # (ubuntu-latest = 24.04 / glibc 2.39 breaks older distros like Ubuntu 20.04.)
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libssl-dev
      - name: Build bz-pool-miner
        run: |
          cmake -S pool/native -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS=-static-libstdc++
          cmake --build build --target bz-pool-miner -j"$(nproc)"
          mkdir -p dist
          cp build/bz-pool-miner dist/
          tar -czf bz-pool-miner-linux-x64.tar.gz -C dist bz-pool-miner
      - uses: actions/upload-artifact@v4
        with:
          name: bz-pool-miner-linux
          path: bz-pool-miner-linux-x64.tar.gz

  linux-arm64:
    # ubuntu-22.04-arm: GitHub-hosted ARM64 runner (free for public repos), glibc 2.35.
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libssl-dev
      - name: Build bz-pool-miner
        run: |
          cmake -S pool/native -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS=-static-libstdc++
          cmake --build build --target bz-pool-miner -j"$(nproc)"
          mkdir -p dist
          cp build/bz-pool-miner dist/
          tar -czf bz-pool-miner-linux-arm64.tar.gz -C dist bz-pool-miner
      - uses: actions/upload-artifact@v4
        with:
          name: bz-pool-miner-linux-arm64
          path: bz-pool-miner-linux-arm64.tar.gz

  macos:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: brew install cmake openssl@3
      - name: Build bz-pool-miner
        run: |
          cmake -S pool/native -B build -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"
          cmake --build build --target bz-pool-miner -j"$(sysctl -n hw.ncpu)"
          mkdir -p dist
          cp build/bz-pool-miner dist/
          tar -czf bz-pool-miner-macos-arm64.tar.gz -C dist bz-pool-miner
      - uses: actions/upload-artifact@v4
        with:
          name: bz-pool-miner-macos
          path: bz-pool-miner-macos-arm64.tar.gz

  release:
    needs: [windows, linux, linux-arm64, macos]
    # Publish whatever platforms built — one platform failing must not block the others.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            artifacts/bz-pool-miner-windows/bz-pool-miner.exe
            artifacts/bz-pool-miner-windows/libssl-3-x64.dll
            artifacts/bz-pool-miner-windows/libcrypto-3-x64.dll
            artifacts/bz-pool-miner-linux/bz-pool-miner-linux-x64.tar.gz
            artifacts/bz-pool-miner-linux-arm64/bz-pool-miner-linux-arm64.tar.gz
            artifacts/bz-pool-miner-macos/bz-pool-miner-macos-arm64.tar.gz
          generate_release_notes: false
          body: |
            BLOZ pool miner for pool.bloz.org

            Linux build targets **glibc 2.35+** (Ubuntu 22.04, Debian 12, current VPS).
            On older distros (Ubuntu 20.04 / Debian 11), use the Python fallback in `mine-pool.sh`
            or build from source.

            | Platform | File | Run |
            |----------|------|-----|
            | Windows | `bz-pool-miner.exe` (+ DLLs) | `mine-mainnet.ps1 -Pool` |
            | Linux x64 | `bz-pool-miner-linux-x64.tar.gz` | `mine-pool.sh` |
            | Linux arm64 | `bz-pool-miner-linux-arm64.tar.gz` | `mine-pool.sh` |
            | macOS (Apple Silicon) | `bz-pool-miner-macos-arm64.tar.gz` | `mine-pool.sh` |

            Recommended: use blockzero-ops scripts instead of running the binary directly.
